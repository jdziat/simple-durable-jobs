<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Simple Durable Jobs">
  <defs>
    <linearGradient id="sdj-g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7.5" fill="url(#sdj-g)"/>
  <!-- durable retry loop: open ring with arrowhead -->
  <path d="M16 6.6 a9.4 9.4 0 1 1 -8.1 4.6"
        fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" opacity="0.92"/>
  <!-- arrowhead closing the loop at the top -->
  <path d="M12.4 6.0 L16.6 6.4 L15.0 10.3 Z" fill="#ffffff" opacity="0.92"/>
  <!-- checkpoint check at the center -->
  <path d="M11.5 16.4 l3.1 3.1 l6.0 -6.6"
        fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
