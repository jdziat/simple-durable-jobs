syntax = "proto3";
package jobs.v1;

option go_package = "github.com/jdziat/simple-durable-jobs/v4/ui/gen/jobs/v1;jobsv1";

import "google/protobuf/timestamp.proto";

service JobsService {
  // Dashboard
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
  rpc GetStatsHistory(GetStatsHistoryRequest) returns (GetStatsHistoryResponse);

  // Jobs
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  rpc RetryJob(RetryJobRequest) returns (RetryJobResponse);
  rpc DeleteJob(DeleteJobRequest) returns (DeleteJobResponse);
  rpc BulkRetryJobs(BulkRetryJobsRequest) returns (BulkRetryJobsResponse);
  rpc BulkDeleteJobs(BulkDeleteJobsRequest) returns (BulkDeleteJobsResponse);

  // Pause/Resume
  rpc PauseJob(PauseJobRequest) returns (PauseJobResponse);
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
  rpc ResumeJob(ResumeJobRequest) returns (ResumeJobResponse);
  rpc PauseQueue(PauseQueueRequest) returns (PauseQueueResponse);
  rpc ResumeQueue(ResumeQueueRequest) returns (ResumeQueueResponse);

  // Queues
  rpc ListQueues(ListQueuesRequest) returns (ListQueuesResponse);
  rpc PurgeQueue(PurgeQueueRequest) returns (PurgeQueueResponse);

  // Scheduled
  rpc ListScheduledJobs(ListScheduledJobsRequest) returns (ListScheduledJobsResponse);

  // Workflows
  rpc GetWorkflow(GetWorkflowRequest) returns (GetWorkflowResponse);
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);

  // Real-time
  rpc WatchEvents(WatchEventsRequest) returns (stream Event);
}

// --- Messages ---

message Job {
  string id = 1;
  string type = 2;
  string queue = 3;
  string status = 4;
  int32 priority = 5;
  int32 attempt = 6;
  int32 max_retries = 7;
  bytes args = 8;
  string last_error = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp started_at = 11;
  google.protobuf.Timestamp completed_at = 12;
  google.protobuf.Timestamp run_at = 13;
  optional string parent_job_id = 14;
  optional string root_job_id = 15;
  optional string fan_out_id = 16;
  int32 fan_out_index = 17;
  bytes result = 18;
  optional google.protobuf.Timestamp dead_lettered_at = 19;
  string dead_letter_reason = 20;
  string worker = 21;
  string tenant = 22;
  map<string, string> metadata = 23;
}

message Checkpoint {
  string id = 1;
  string job_id = 2;
  int32 call_index = 3;
  string call_type = 4;
  bytes result = 5;
  string error = 6;
  google.protobuf.Timestamp created_at = 7;
}

message QueueStats {
  string name = 1;
  int64 pending = 2;
  int64 running = 3;
  int64 completed = 4;
  int64 failed = 5;
  int64 paused = 6;
  bool is_paused = 7;
  google.protobuf.Timestamp oldest_pending_at = 8;
  int64 retrying = 9;
  int64 waiting = 10;
  int64 cancelled = 11;
}

message FanOut {
  string id = 1;
  string parent_job_id = 2;
  int32 total_count = 3;
  int32 completed_count = 4;
  int32 failed_count = 5;
  int32 cancelled_count = 6;
  string strategy = 7;
  double threshold = 8;
  string status = 9;
  google.protobuf.Timestamp timeout_at = 10;
  bool cancel_on_fail = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message Event {
  string type = 1;
  Job job = 2;
  google.protobuf.Timestamp timestamp = 3;
  string queue = 4;
  string job_id = 5;
  string worker_id = 6;
  string reason = 7;
}

// --- Requests/Responses ---

message GetStatsRequest {}
message GetStatsResponse {
  repeated QueueStats queues = 1;
  int64 total_pending = 2;
  int64 total_running = 3;
  int64 total_completed = 4;
  int64 total_failed = 5;
  int32 active_workers = 6;
  int64 total_paused = 7;
  int64 total_retrying = 8;
  int64 total_waiting = 9;
  int64 total_cancelled = 10;
}

message GetStatsHistoryRequest {
  string period = 1;
  string queue = 2;
}
message GetStatsHistoryResponse {
  repeated DataPoint completed = 1;
  repeated DataPoint failed = 2;
}
message DataPoint {
  google.protobuf.Timestamp timestamp = 1;
  int64 value = 2;
}

message ListJobsRequest {
  string status = 1;
  string queue = 2;
  string type = 3;
  string search = 4;
  google.protobuf.Timestamp since = 5;
  google.protobuf.Timestamp until = 6;
  int32 page = 7;
  int32 limit = 8;
  string tenant = 9;
  map<string, string> meta_contains = 10;
  // sort_key selects the column to order by across the full result set (not just
  // the current page). Server-validated against a whitelist; unknown values fall
  // back to the default (created_at). sort_dir is "asc" or "desc" (default desc).
  string sort_key = 11;
  string sort_dir = 12;
}
message ListJobsResponse {
  repeated Job jobs = 1;
  int64 total = 2;
  int32 page = 3;
}

message GetJobRequest {
  string id = 1;
}
message GetJobResponse {
  Job job = 1;
  repeated Checkpoint checkpoints = 2;
}

message RetryJobRequest {
  string id = 1;
}
message RetryJobResponse {
  Job job = 1;
}

message DeleteJobRequest {
  string id = 1;
  // delete_subtree removes the whole workflow subtree rooted at id (the
  // workflow-aware delete). When false, deleting a workflow parent is refused
  // with FailedPrecondition. Additive field — older clients omit it (= false).
  bool delete_subtree = 2;
}
message DeleteJobResponse {}

message BulkRetryJobsRequest {
  repeated string ids = 1;
}
message BulkRetryJobsResponse {
  // count is the number of jobs successfully retried. skipped lists every id
  // that was NOT retried, with a human-readable reason (e.g. "not found",
  // "workflow parent"), so callers can distinguish benign misses from failures
  // instead of inferring loss from a reduced count. Additive field.
  int32 count = 1;
  repeated BulkSkip skipped = 2;
}

message BulkDeleteJobsRequest {
  repeated string ids = 1;
}
message BulkDeleteJobsResponse {
  // count is the number of jobs successfully deleted; skipped lists every id
  // that was NOT deleted, with a reason. Additive field. See BulkRetryJobsResponse.
  int32 count = 1;
  repeated BulkSkip skipped = 2;
}

// BulkSkip reports one id that a bulk mutation did not apply, and why.
message BulkSkip {
  string id = 1;
  string reason = 2;
}

message PauseJobRequest {
  string id = 1;
}
message PauseJobResponse {
  Job job = 1;
}

message CancelJobRequest {
  string id = 1;
}
message CancelJobResponse {
  Job job = 1;
}

message ResumeJobRequest {
  string id = 1;
}
message ResumeJobResponse {
  Job job = 1;
}

message PauseQueueRequest {
  string name = 1;
}
message PauseQueueResponse {}

message ResumeQueueRequest {
  string name = 1;
}
message ResumeQueueResponse {}

message ListQueuesRequest {}
message ListQueuesResponse {
  repeated QueueStats queues = 1;
}

message PurgeQueueRequest {
  string name = 1;
  string status = 2;
}
message PurgeQueueResponse {
  int64 deleted = 1;
}

message ListScheduledJobsRequest {}
message ListScheduledJobsResponse {
  repeated ScheduledJobInfo jobs = 1;
}
message ScheduledJobInfo {
  string name = 1;
  string schedule = 2;
  string queue = 3;
  google.protobuf.Timestamp next_run = 4;
  google.protobuf.Timestamp last_run = 5;
}

message GetWorkflowRequest {
  string job_id = 1;
}
message GetWorkflowResponse {
  Job root = 1;
  repeated FanOut fan_outs = 2;
  repeated Job children = 3;
  // truncated is set when the returned tree is INCOMPLETE: the parent chain
  // exceeded the root-find hop cap (or contained a cycle), or the collected
  // descendant set hit the per-request node cap. Consumers must not treat a
  // truncated tree as the whole workflow.
  bool truncated = 4;
}

message ListWorkflowsRequest {
  int32 page = 1;
  int32 limit = 2;
  string status = 3;
}
message ListWorkflowsResponse {
  repeated WorkflowSummary workflows = 1;
  int64 total = 2;
  int32 page = 3;
}

message WorkflowSummary {
  Job root_job = 1;
  int32 total_jobs = 2;
  int32 completed_jobs = 3;
  int32 failed_jobs = 4;
  int32 running_jobs = 5;
  string strategy = 6;
}

message WatchEventsRequest {
  repeated string queues = 1;
}
