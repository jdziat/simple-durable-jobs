version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. They are pinned to commit SHAs in
  # the workflows for supply-chain safety and reproducibility; Dependabot bumps
  # the SHA (and the trailing # vX.Y.Z comment) when a new release ships.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
