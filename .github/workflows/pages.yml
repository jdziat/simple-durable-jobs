name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'ui/frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# CI pins Go to 1.25.11 (matches go.mod's `toolchain` directive) so setup-go
# installs it directly: no on-the-fly sum.golang.org toolchain download
# (which flaked Lint) and CI runs the patched stdlib. Bump with go.mod.

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Build UI Demo
        working-directory: ui/frontend
        run: |
          npm ci
          npm run build:demo

      - name: Copy demo to static
        run: mkdir -p docs/static && cp -r ui/frontend/demo-dist docs/static/demo

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: '0.162.1'
          extended: true

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25.11'

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4.0.0

      - name: Build with Hugo
        run: hugo --minify --source docs

      - name: Verify live demo serves the SPA (not the docs shell)
        run: |
          # /demo/ must serve the Svelte dashboard bundle, not a Hugo-rendered
          # page. A content page named demo.md would shadow static/demo/ and
          # produce a recursive, empty iframe. Guard against that regression.
          if ! grep -q 'id="app"' docs/public/demo/index.html; then
            echo "::error::docs/public/demo/index.html does not contain the SPA mount (id=\"app\"). Did a content page shadow docs/static/demo/?"
            exit 1
          fi
          echo "OK: /demo/ serves the SPA bundle."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
