name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'ui/frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# CI pins Go to 1.25.11 (matches go.mod's `toolchain` directive) so setup-go
# installs it directly: no on-the-fly sum.golang.org toolchain download
# (which flaked Lint) and CI runs the patched stdlib. Bump with go.mod.

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Build UI Demo
        working-directory: ui/frontend
        run: |
          npm ci
          npm run build:demo

      - name: Copy demo to static
        run: mkdir -p docs/static && cp -r ui/frontend/demo-dist docs/static/demo

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: '0.162.1'
          extended: true

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25.11'

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build with Hugo
        run: hugo --minify --source docs

      - name: Verify live demo serves the SPA (not the docs shell)
        run: |
          # /demo/ must serve the Svelte dashboard bundle, not a Hugo-rendered
          # page. A content page named demo.md would shadow static/demo/ and
          # produce a recursive, empty iframe. Guard against that regression.
          if ! grep -q 'id="app"' docs/public/demo/index.html; then
            echo "::error::docs/public/demo/index.html does not contain the SPA mount (id=\"app\"). Did a content page shadow docs/static/demo/?"
            exit 1
          fi
          echo "OK: /demo/ serves the SPA bundle."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
