name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'ui/frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/frontend/package-lock.json

      - name: Build UI Demo
        working-directory: ui/frontend
        run: |
          npm ci
          npm run build:demo

      - name: Copy demo to static
        run: mkdir -p docs/static && cp -r ui/frontend/demo-dist docs/static/demo

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Hugo
        run: hugo --minify --source docs

      - name: Verify live demo serves the SPA (not the docs shell)
        run: |
          # /demo/ must serve the Svelte dashboard bundle, not a Hugo-rendered
          # page. A content page named demo.md would shadow static/demo/ and
          # produce a recursive, empty iframe. Guard against that regression.
          if ! grep -q 'id="app"' docs/public/demo/index.html; then
            echo "::error::docs/public/demo/index.html does not contain the SPA mount (id=\"app\"). Did a content page shadow docs/static/demo/?"
            exit 1
          fi
          echo "OK: /demo/ serves the SPA bundle."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
