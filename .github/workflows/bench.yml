name: Benchmarks

on:
  schedule:
    - cron: '37 6 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    name: Bench (${{ matrix.backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: sqlite
          - backend: postgres

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jobs_test
          POSTGRES_USER: jobs
          POSTGRES_PASSWORD: jobs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobs -d jobs_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks
        env:
          BENCH_COUNT: "3"
          TEST_DATABASE_URL: ${{ matrix.backend == 'postgres' && 'postgres://jobs:jobs@localhost:5432/jobs_test?sslmode=disable' || '' }}
        run: scripts/bench.sh ${{ matrix.backend }}

      - name: Upload raw benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.backend }}
          path: bench-results/${{ matrix.backend }}.txt
          if-no-files-found: error

      - name: Compare with baseline
        run: |
          {
            echo "## Benchmark delta: ${{ matrix.backend }}"
            echo
            echo '```'
            # WARN-only: hosted CI runners and shared service containers are noisy,
            # so regressions are surfaced in the job summary instead of failing CI.
            benchstat benchmarks/baseline/${{ matrix.backend }}.txt bench-results/${{ matrix.backend }}.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
