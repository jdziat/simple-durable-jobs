name: Benchmarks

on:
  schedule:
    - cron: '37 6 * * 2'
  workflow_dispatch:

permissions:
  contents: read

# CI pins Go to 1.25.11 (matches go.mod's `toolchain` directive) so setup-go
# installs it directly: no on-the-fly sum.golang.org toolchain download
# (which flaked Lint) and CI runs the patched stdlib. Bump with go.mod.

jobs:
  bench:
    name: Bench (${{ matrix.backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: sqlite
          - backend: postgres

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jobs_test
          POSTGRES_USER: jobs
          POSTGRES_PASSWORD: jobs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobs -d jobs_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.25.11'

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260512194132-3cf34090a3db

      - name: Run benchmarks
        env:
          BENCH_COUNT: "3"
          TEST_DATABASE_URL: ${{ matrix.backend == 'postgres' && 'postgres://jobs:jobs@localhost:5432/jobs_test?sslmode=disable' || '' }}
        run: scripts/bench.sh ${{ matrix.backend }}

      - name: Upload raw benchmark output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-${{ matrix.backend }}
          path: bench-results/${{ matrix.backend }}.txt
          if-no-files-found: error

      - name: Compare with baseline
        run: |
          {
            echo "## Benchmark delta: ${{ matrix.backend }}"
            echo
            echo '```'
            # WARN-only: hosted CI runners and shared service containers are noisy,
            # so regressions are surfaced in the job summary instead of failing CI.
            benchstat benchmarks/baseline/${{ matrix.backend }}.txt bench-results/${{ matrix.backend }}.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
