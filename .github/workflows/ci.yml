name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

# CI pins Go to 1.25.11 (matches go.mod's `toolchain` directive) so setup-go
# installs it directly: no on-the-fly sum.golang.org toolchain download
# (which flaked Lint) and CI runs the patched stdlib. Bump with go.mod.

jobs:
  test-backends:
    name: Tests (${{ matrix.backend }})
    runs-on: ubuntu-latest

    # One parallel job per backend. Each builds the test image (frontend assets
    # + Go toolchain + source) and runs the suite in a container via docker
    # compose. fail-fast is off so a failure in one backend doesn't cancel the
    # others.
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: sqlite
            db: ""
          - backend: postgres
            db: postgres
          - backend: mysql
            db: mysql

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build test image
        run: docker compose build tests

      # SQLite is in-process and needs no service; the DB backends start only
      # the one they need (--no-deps on the run keeps the other from starting).
      - name: Start database
        if: matrix.db != ''
        run: docker compose up -d --wait ${{ matrix.db }}

      - name: Run tests
        run: docker compose run --rm --no-deps tests ${{ matrix.backend }}

      - name: Stop database
        if: always() && matrix.db != ''
        run: docker compose down -v

      # Coverage is dialect-split, so upload each backend's profile as an
      # artifact and let the `coverage` job merge them before sending the
      # combined result to Codecov (a single-backend profile understates the
      # storage layer's real coverage).
      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-${{ matrix.backend }}
          path: ./coverage/coverage-${{ matrix.backend }}.out
          if-no-files-found: warn

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test-backends]
    if: always()
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25.11'

      - name: Download coverage artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: coverage-*
          path: coverage-raw
          merge-multiple: true

      - name: Merge backend coverage profiles
        run: |
          shopt -s nullglob
          files=(coverage-raw/coverage-*.out)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no coverage profiles found; skipping merge"
            exit 0
          fi
          go run github.com/wadey/gocovmerge@v0.0.0-20160331181800-b5bfa59ec0ad "${files[@]}" > coverage-merged.out
          echo "Merged coverage:"
          go tool cover -func=coverage-merged.out | tail -1

      - name: Upload merged coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          files: ./coverage-merged.out
          fail_ci_if_error: false

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25.11'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: Download Go dependencies
        run: go mod download

      - name: Install Playwright
        working-directory: ui/frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ui/frontend
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: ui/frontend/playwright-report/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25.11'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7.0.1
        with:
          version: v2.8.0
          install-mode: binary
          args: --timeout=5m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25.11'

      # Pinned for reproducibility. govulncheck still fetches the current
      # vulnerability database at runtime, so the pinned binary stays current on
      # advisories; bump the pin deliberately (Dependabot tracks Actions).
      # ./... covers only the root module; docs/ is excluded by its own go.mod.
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

  api-compat:
    name: api-compat
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so gorelease sees the version tags and infers the correct
      # base version; a shallow clone compares against the wrong tag and fails
      # once a release has been published.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25.11'

      # Enforces VERSIONING.md's v1 stability promise: incompatible changes fail
      # this gate, while additive minor changes are allowed and expected.
      - name: Run gorelease
        run: |
          report_path="${RUNNER_TEMP:-/tmp}/gorelease-report.txt"
          # Pinned (x/exp has no stable releases): the grep below is coupled to
          # gorelease's report format, so a floating @latest could silently turn
          # this gate into a no-op if the header wording ever changes. Bump the
          # pin deliberately and re-verify the grep when updating.
          GORELEASE="golang.org/x/exp/cmd/gorelease@v0.0.0-20260603202125-055de637280b"

          # Major-version-cut detection. At a /vN bump (N>=2) there is no vN.* tag
          # yet, so a BARE gorelease infers no base and passes VACUOUSLY — the gate
          # would protect nothing on the one PR that contains every intended break.
          # On that boundary we instead compare against the previous major's latest
          # tag, PRINT the break ledger for human review, and refuse to pass only if
          # gorelease produced no comparison at all. Incompatible changes are EXPECTED
          # for a major and are NOT failed here. The strict check below re-arms
          # automatically once vN.0.0 is tagged (bare gorelease then finds a vN base).
          module="$(go list -m)"
          major="${module##*/v}"
          case "$major" in (''|*[!0-9]*) major=1 ;; esac
          if [ "$major" -ge 2 ] && ! git tag | grep -qE "^v${major}\."; then
            prev=$((major - 1))
            base="$(git tag | grep -E "^v${prev}\." | sort -V | tail -1)"
            echo "::notice::major-version cut (module=$module, no v${major} tag); break ledger vs ${base:-<none>}:"
            set +e
            go run "$GORELEASE" -base="$base" > "$report_path" 2>&1
            set -e
            cat "$report_path"
            if [ -z "$base" ] || [ ! -s "$report_path" ] || grep -qiE "no previous version|no version to compare|could not" "$report_path"; then
              echo "api-compat: gorelease produced no comparison against '${base:-<none>}' at the major boundary; refusing to pass vacuously."
              exit 1
            fi
            echo "::notice::major-version cut: incompatible changes are EXPECTED; review the ledger above (path-change noise is normal)."
            exit 0
          fi

          # Normal path: enforce VERSIONING.md's stability promise WITHIN the current
          # major — incompatible changes fail, additive minor changes are expected.
          set +e
          go run "$GORELEASE" > "$report_path" 2>&1
          gorelease_status=$?
          set -e

          cat "$report_path"

          if grep -Eiq '(^|[[:space:]])incompatible changes(:|$)' "$report_path"; then
            echo "gorelease found incompatible API changes"
            exit 1
          fi

          exit "$gorelease_status"

  chaos-smoke:
    name: Chaos smoke (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # A short multi-worker crash/recovery run on every PR so regressions in the
    # lock/heartbeat/reaper/ownership paths are caught before merge, not just by
    # the nightly Stress & Chaos workflow. The full PG+MySQL chaos runs nightly.
    env:
      CHAOS_DURATION: "25"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run chaos smoke
        run: bash scripts/chaos-test.sh postgres

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backends, lint]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.25.11'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: Build
        run: go build -v ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    # The trust gates are release-blocking: a vulnerability finding or an
    # incompatible API change must stop the tag, not just fail a check.
    # A HARD crash/recovery invariant failure (chaos-smoke) or a broken
    # embedded-dashboard e2e run (test-e2e) must likewise stop the tag.
    needs: [build, govulncheck, api-compat, chaos-smoke, test-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      # Major-bump guard. semantic-release infers a MAJOR only from a breaking
      # marker (a `<type>!:` subject or a `BREAKING CHANGE:` footer). If the module
      # path is already /vN (N>=2) but no vN.* tag exists yet and the commits since
      # the last tag carry NO breaking marker, semantic-release would compute a
      # MINOR and silently mis-tag the major as a v(N-1).x release (the v1.3.0
      # squash-title incident). Fail loudly before tagging so the commit message
      # can be fixed and the run retried.
      - name: Guard the major-version bump
        run: |
          module="$(go list -m)"
          major="${module##*/v}"
          case "$major" in (''|*[!0-9]*) major=1 ;; esac
          if [ "$major" -ge 2 ] && ! git tag | grep -qE "^v${major}\."; then
            last="$(git describe --tags --abbrev=0 2>/dev/null || echo '')"
            range="${last:+${last}..}HEAD"
            if ! git log "$range" --format='%s%n%b' \
                 | grep -qE '^[a-z]+(\([^)]*\))?!:|^BREAKING CHANGE'; then
              echo "::error::module is ${module} (v${major}) but no breaking-change commit since ${last:-<root>}; semantic-release would mis-tag a minor instead of v${major}.0.0. Add a '<type>!:' subject or a 'BREAKING CHANGE:' footer."
              exit 1
            fi
            echo "::notice::major bump guard OK — breaking-change commit present for v${major}.0.0."
          fi

      - uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f # v1.24.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          changelog-generator-opt: "emojis=true"
          allow-initial-development-releases: true
