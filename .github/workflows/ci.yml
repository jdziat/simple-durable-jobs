name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test-backends:
    name: Tests (${{ matrix.backend }})
    runs-on: ubuntu-latest

    # One parallel job per backend. Each builds the test image (frontend assets
    # + Go toolchain + source) and runs the suite in a container via docker
    # compose. fail-fast is off so a failure in one backend doesn't cancel the
    # others.
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: sqlite
            db: ""
          - backend: postgres
            db: postgres
          - backend: mysql
            db: mysql

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker compose build tests

      # SQLite is in-process and needs no service; the DB backends start only
      # the one they need (--no-deps on the run keeps the other from starting).
      - name: Start database
        if: matrix.db != ''
        run: docker compose up -d --wait ${{ matrix.db }}

      - name: Run tests
        run: docker compose run --rm --no-deps tests ${{ matrix.backend }}

      - name: Stop database
        if: always() && matrix.db != ''
        run: docker compose down -v

      # Coverage is dialect-split, so upload each backend's profile as an
      # artifact and let the `coverage` job merge them before sending the
      # combined result to Codecov (a single-backend profile understates the
      # storage layer's real coverage).
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.backend }}
          path: ./coverage/coverage-${{ matrix.backend }}.out
          if-no-files-found: warn

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test-backends]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-raw
          merge-multiple: true

      - name: Merge backend coverage profiles
        run: |
          shopt -s nullglob
          files=(coverage-raw/coverage-*.out)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no coverage profiles found; skipping merge"
            exit 0
          fi
          go run github.com/wadey/gocovmerge@latest "${files[@]}" > coverage-merged.out
          echo "Merged coverage:"
          go tool cover -func=coverage-merged.out | tail -1

      - name: Upload merged coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-merged.out
          fail_ci_if_error: false

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: Download Go dependencies
        run: go mod download

      - name: Install Playwright
        working-directory: ui/frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ui/frontend
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ui/frontend/playwright-report/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      # Use @latest so CI picks up the newest vulnerability database handling.
      # ./... covers only the root module; docs/ is excluded by its own go.mod.
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  api-compat:
    name: api-compat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      # Enforces VERSIONING.md's v1 stability promise: incompatible changes fail
      # this gate, while additive minor changes are allowed and expected.
      - name: Run gorelease
        run: |
          report_path="${RUNNER_TEMP:-/tmp}/gorelease-report.txt"

          # Pinned (x/exp has no stable releases): the grep below is coupled to
          # gorelease's report format, so a floating @latest could silently turn
          # this gate into a no-op if the header wording ever changes. Bump the
          # pin deliberately and re-verify the grep when updating.
          set +e
          go run golang.org/x/exp/cmd/gorelease@v0.0.0-20260603202125-055de637280b > "$report_path" 2>&1
          gorelease_status=$?
          set -e

          cat "$report_path"

          if grep -Eiq '(^|[[:space:]])incompatible changes(:|$)' "$report_path"; then
            echo "gorelease found incompatible API changes"
            exit 1
          fi

          exit "$gorelease_status"

  chaos-smoke:
    name: Chaos smoke (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # A short multi-worker crash/recovery run on every PR so regressions in the
    # lock/heartbeat/reaper/ownership paths are caught before merge, not just by
    # the nightly Stress & Chaos workflow. The full PG+MySQL chaos runs nightly.
    env:
      CHAOS_DURATION: "25"
    steps:
      - uses: actions/checkout@v4
      - name: Run chaos smoke
        run: bash scripts/chaos-test.sh postgres

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backends, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: Build
        run: go build -v ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    # The trust gates are release-blocking: a vulnerability finding or an
    # incompatible API change must stop the tag, not just fail a check.
    needs: [build, govulncheck, api-compat]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          changelog-generator-opt: "emojis=true"
          allow-initial-development-releases: true
