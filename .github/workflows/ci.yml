name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test-sqlite:
    name: Test (SQLite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -short -race -coverprofile=coverage.out $(go list ./... | grep -v /examples/ | grep -v /ui/cmd/ | grep -v /ui/gen/)

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: sqlite
          fail_ci_if_error: false

  test-postgres:
    name: Test (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jobs_test
          POSTGRES_USER: jobs
          POSTGRES_PASSWORD: jobs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobs -d jobs_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgres://jobs:jobs@localhost:5432/jobs_test?sslmode=disable
        run: go test -v -short -race -p=1 -coverprofile=coverage-pg.out $(go list ./... | grep -v /examples/ | grep -v /ui/cmd/ | grep -v /ui/gen/)

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-pg.out
          flags: postgres
          fail_ci_if_error: false

  test-mysql:
    name: Test (MySQL)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: jobs_test
          MYSQL_ROOT_PASSWORD: jobs
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        env:
          TEST_MYSQL_URL: root:jobs@tcp(localhost:3306)/jobs_test?parseTime=true
        run: go test -v -short -race -p=1 -coverprofile=coverage-mysql.out $(go list ./... | grep -v /examples/ | grep -v /ui/cmd/ | grep -v /ui/gen/)

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-mysql.out
          flags: mysql
          fail_ci_if_error: false

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: Download Go dependencies
        run: go mod download

      - name: Install Playwright
        working-directory: ui/frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ui/frontend
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ui/frontend/playwright-report/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-sqlite, test-postgres, test-mysql, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: Build
        run: go build -v ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          changelog-generator-opt: "emojis=true"
          allow-initial-development-releases: true
