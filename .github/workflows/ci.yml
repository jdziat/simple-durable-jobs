name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test-backends:
    name: Tests (${{ matrix.backend }})
    runs-on: ubuntu-latest

    # One parallel job per backend. Each builds the test image (frontend assets
    # + Go toolchain + source) and runs the suite in a container via docker
    # compose. fail-fast is off so a failure in one backend doesn't cancel the
    # others.
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: sqlite
            db: ""
          - backend: postgres
            db: postgres
          - backend: mysql
            db: mysql

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker compose build tests

      # SQLite is in-process and needs no service; the DB backends start only
      # the one they need (--no-deps on the run keeps the other from starting).
      - name: Start database
        if: matrix.db != ''
        run: docker compose up -d --wait ${{ matrix.db }}

      - name: Run tests
        run: docker compose run --rm --no-deps tests ${{ matrix.backend }}

      - name: Stop database
        if: always() && matrix.db != ''
        run: docker compose down -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-${{ matrix.backend }}.out
          flags: ${{ matrix.backend }}
          fail_ci_if_error: false

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: Download Go dependencies
        run: go mod download

      - name: Install Playwright
        working-directory: ui/frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ui/frontend
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ui/frontend/playwright-report/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m

  chaos-smoke:
    name: Chaos smoke (Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # A short multi-worker crash/recovery run on every PR so regressions in the
    # lock/heartbeat/reaper/ownership paths are caught before merge, not just by
    # the nightly Stress & Chaos workflow. The full PG+MySQL chaos runs nightly.
    env:
      CHAOS_DURATION: "25"
    steps:
      - uses: actions/checkout@v4
      - name: Run chaos smoke
        run: bash scripts/chaos-test.sh postgres

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backends, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ui/frontend
        run: npm install && npm run build

      - name: Build
        run: go build -v ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          changelog-generator-opt: "emojis=true"
          allow-initial-development-releases: true
