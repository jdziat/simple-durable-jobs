name: Stress & Chaos

on:
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:

jobs:
  # Long-running stress tests on every backend. The DB backends are the ones
  # that exercise the real distributed FOR UPDATE SKIP LOCKED path; SQLite is
  # kept as the single-writer baseline.
  stress:
    name: Stress (${{ matrix.backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: sqlite
            db: ""
          - backend: postgres
            db: postgres
          - backend: mysql
            db: mysql
    env:
      # Drop -short (so the stress tests actually run) and scope to TestStress_*
      # with a long timeout. -race stays on.
      GO_TEST_FLAGS: "-race -timeout=35m -run ^TestStress_"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build test image
        run: docker compose build tests

      - name: Start database
        if: matrix.db != ''
        run: docker compose up -d --wait ${{ matrix.db }}

      - name: Run stress tests
        run: docker compose run --rm --no-deps -e GO_TEST_FLAGS tests ${{ matrix.backend }}

      - name: Stop database
        if: always() && matrix.db != ''
        run: docker compose down -v

  # Multi-worker crash/recovery chaos on both distributed backends. Kills
  # workers at random while a workload drains, then asserts the durability
  # invariants (exactly-once effects, no wedged jobs, fan-out count integrity,
  # unique-key dedup, single-scheduler firing). This is the gate that exercises
  # the lock/heartbeat/reaper/ownership paths under real failure.
  chaos:
    name: Chaos (${{ matrix.backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        backend: [postgres, mysql]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run chaos harness
        run: bash scripts/chaos-test.sh ${{ matrix.backend }}
