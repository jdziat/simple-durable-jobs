# docker-compose.yml — local test backends.
#
# Host ports default to non-standard values (15432, 13306) so the
# containers never collide with a local Postgres or MySQL running on
# the conventional ports. Override via env if you want the defaults:
#
#   POSTGRES_HOST_PORT=5432 MYSQL_HOST_PORT=3306 docker compose up -d
#
# scripts/test-backends.sh reads the same env vars.
services:
  postgres:
    image: postgres:16-alpine
    container_name: sdj-test-postgres
    environment:
      POSTGRES_DB: jobs_test
      POSTGRES_USER: jobs
      POSTGRES_PASSWORD: jobs
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs -d jobs_test"]
      interval: 3s
      timeout: 3s
      retries: 20

  mysql:
    image: mysql:8.0
    container_name: sdj-test-mysql
    environment:
      MYSQL_DATABASE: jobs_test
      MYSQL_ROOT_PASSWORD: jobs
    ports:
      - "${MYSQL_HOST_PORT:-13306}:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pjobs"]
      interval: 3s
      timeout: 3s
      retries: 40
